<!doctype html>
<html lang="sv">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Logga in/Registrera</title>
</head>

<body>
  <header>
    <h1>Välkommen tillbaka</h1>
  </header>

  <main>

    <!--Sektion för log in-->
    <section class="login">
      <h2>Logga in</h2>

      <!--Validering(felmeddelande)-->
      <p id="message"></p>

      <p>Fyll i dina uppgifter för att logga in.</p>

      <form>
        <!--Användarnamn-->
        <label for="loginUser">Användarnamn</label>
        <input id="loginUser" name="username" type="text">

        <!--Lösenord-->
        <label for="loginPass">Lösenord</label>
        <input id="loginPass" name="password" type="password">

        <!--Knapp för att logga in-->
        <button id="loginBtn" type="button">Logga in</button>
      </form>
    </section>

    <!--Sektion för register-->
    <section class="register">
      <h3>Registrera dig</h3>

      <p>Har du inget konto? Registrera dig nedan.</p>

      <!--Validering(felmeddelande)-->
      <p id="messagereg"></p>

      <form>
        <!--Användarnamn-->
        <label for="regUser">Användarnamn</label>
        <input id="regUser" name="username" type="text">

        <!--Lösenord-->
        <label for="regPass">Lösenord</label>
        <input id="regPass" name="password" type="password">

        <!--Knapp för registrering-->
        <button id="regBtn" type="button">Registrera dig</button>

      </form>

    </section>

  </main>

  <footer>
    <p><strong>Sida skapad av:</strong></p>
    <p>Daniela Giovanella<br>dagi2500@student.miun.se</p>
  </footer>

  <script type="module" src="/src/assets/login.js"></script>
</body>

</html>
